<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - СпортСистема</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <!-- Логотип -->
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-gradient-to-r from-yellow-500 to-yellow-600 rounded-2xl flex items-center justify-center mx-auto shadow-lg mb-4">
                <span class="text-4xl">🏐</span>
            </div>
            <h1 class="text-3xl font-bold text-white">СпортСистема</h1>
            <p class="text-white/80 mt-2">Управление волейбольной командой</p>
        </div>

        <!-- Карточка входа -->
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Добро пожаловать!</h2>
            <p class="text-gray-500 mb-6">Войдите в свой аккаунт</p>

            <!-- Сообщения -->
            {% if messages %}
                {% for message in messages %}
                    <div class="mb-4 p-3 rounded-lg {% if message.tags == 'success' %}bg-green-100 text-green-700 border border-green-200{% else %}bg-red-100 text-red-700 border border-red-200{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <!-- Форма -->
            <form method="post" class="space-y-5">
                {% csrf_token %}

                <div>
                    <label class="block text-gray-700 font-medium mb-2">Имя пользователя</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400">👤</span>
                        <input type="text" name="username" required
                               class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-yellow-500 focus:ring-2 focus:ring-yellow-200 transition"
                               placeholder="Введите имя пользователя">
                    </div>
                </div>

                <div>
                    <label class="block text-gray-700 font-medium mb-2">Пароль</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400">🔒</span>
                        <input type="password" name="password" required
                               class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-yellow-500 focus:ring-2 focus:ring-yellow-200 transition"
                               placeholder="Введите пароль">
                    </div>
                </div>

                <button type="submit"
                        class="w-full bg-gradient-to-r from-yellow-500 to-yellow-600 text-white py-3 rounded-lg font-semibold hover:from-yellow-600 hover:to-yellow-700 transition shadow-md">
                    Войти
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-gray-600">
                    Нет аккаунта?
                    <a href="{% url 'register' %}" class="text-yellow-600 font-semibold hover:text-yellow-700 transition">
                        Зарегистрируйтесь
                    </a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
